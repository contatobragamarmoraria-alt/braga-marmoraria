name: Build & Deploy Braga Marmoraria

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Fix vulnerabilities safely
        run: npm audit fix || true

      - name: Run audit (non-blocking)
        run: npm audit || true

      - name: Build project
        run: npm run build

      - name: Verify dist output
        run: |
          echo "=== Build Output ==="
          ls -la dist/
          echo "=== Assets ==="
          ls -la dist/assets/
          echo "=== .htaccess present ==="
          test -f dist/.htaccess && echo "OK" || echo "MISSING"
